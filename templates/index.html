<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Assistente Escolar IA</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <h2>🎓 Escola IA</h2>

        <button onclick="novoChat()">➕ Novo Chat</button>
        <button onclick="excluirChatAtual()">🗑️ Excluir Chat</button>
        <button onclick="pararVoz()">🔇 Parar Voz</button>

        <div id="lista-chats"></div>

        <div class="status">🟢 Online</div>
    </aside>

    <main class="chat">
        <h1 id="titulo-chat">Assistente Escolar</h1>

        <div id="mensagens"></div>

        <div class="entrada">
            <button onclick="iniciarMicrofone()">🎤</button>

            <button onclick="alternarModoContinuo()" id="btn-continuo">
                🔁 Voz contínua
            </button>

            <input
                id="pergunta"
                type="text"
                placeholder="Digite ou fale..."
            >

            <button onclick="enviar()">Enviar</button>
        </div>
    </main>

</div>

<script src="/static/script.js"></script>

</body>
</html>
